<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Back to Home 🏡</a>
        </nav>
    </header>

    <hr>

    <main>
        <h1>Would like to Bring your ideas to reality ?</h1>
        <h3>Contact us now, and we will bring your idea to life,</h3>

        <table cellpadding="12" width="100%">
            <tr>
                <td width="65%" valign="top">
                    <form action="#" method="post">
                        <p>
                            <label for="name">Name :</label><br>
                            <input type="text" id="name" name="name">
                        </p>

                        <p>
                            <label for="contact_method">Your preferred contact method :</label><br>
                            <select id="contact_method" name="contact_method">
                                <option>Email</option>
                                <option>Phone</option>
                                <option>WhatsApp</option>
                            </select>
                        </p>

                        <p>
                            <label for="email">Email :</label><br>
                            <input type="email" id="email" name="email">
                        </p>

                        <p>
                            <label for="phone">Phone :</label><br>
                            <input type="tel" id="phone" name="phone">
                        </p>

                        <p>
                            <label for="idea">Give us a brief description of your idea :</label><br>
                            <textarea id="idea" name="idea" rows="6" cols="50"></textarea>
                        </p>

                        <p>
                            <button type="submit">Submit</button>
                        </p>
                    </form>
                </td>
                <td width="35%" valign="top" align="right">
                    <img src="./images/contact_us.jpg" alt="Contact Us" width="320">
                </td>
            </tr>
        </table>
    </main>

    <hr>

    <footer>
        <p><a href="index.html">Home 🏡</a> | <a href="about.html">About Me 🥸</a> | <a href="contact.html">Contact US 📲</a></p>
        <p><strong>Desclaimer</strong> : Everything here is for Demo purpose only. <strong>Created By</strong> : Dr. Witcher.</p>
    </footer>
</body>
</html>
